<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KidGuard — Blocked</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(160deg,#07090f 0%,#0d1a2e 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Segoe UI',Arial,sans-serif;color:#e2e8f0;
}
.box{
  background:#111827;border:1px solid #1f2d45;
  border-radius:24px;padding:52px 52px 44px;
  text-align:center;max-width:520px;width:92%;
  box-shadow:0 24px 72px rgba(0,0,0,.75);
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{
  from{opacity:0;transform:scale(.85) translateY(24px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.shield{font-size:68px;margin-bottom:16px;filter:drop-shadow(0 0 24px rgba(239,68,68,.45))}
.badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  color:#f87171;border-radius:20px;padding:5px 16px;
  font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:18px;
}
h1{font-size:30px;font-weight:800;color:#f1f5f9;margin-bottom:12px;letter-spacing:-.4px}
.site-tag{
  font-family:'Courier New',monospace;font-size:14px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);
  color:#f87171;border-radius:8px;padding:6px 18px;
  display:inline-block;margin-bottom:16px;max-width:100%;
  word-break:break-all;
}
.reason{font-size:14px;color:#64748b;line-height:1.75;margin-bottom:30px;white-space:pre-line}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{
  padding:13px 26px;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;
  transition:all .2s;display:inline-flex;align-items:center;gap:7px;
  text-decoration:none;
}
#btn-back{
  background:#1e293b;color:#94a3b8;
  border:1px solid #334155;
}
#btn-back:hover{background:#273449;color:#e2e8f0;transform:translateY(-1px)}
#btn-home{
  background:#ef4444;color:#fff;
  border:1px solid #ef4444;
}
#btn-home:hover{background:#dc2626;transform:translateY(-1px);box-shadow:0 6px 18px rgba(239,68,68,.3)}
.footer{margin-top:26px;font-size:11px;color:#334155}
</style>
</head>
<body>
<div class="box">
  <div class="shield">🛡</div>
  <div class="badge">🔒 KidGuard Parental Control</div>
  <h1 id="main-title">Website Blocked</h1>
  <div class="site-tag" id="site-tag">This website</div>
  <p class="reason" id="reason-text">This website has been blocked by your parent or guardian.</p>
  <div class="btns">
    <button class="btn" id="btn-back">← Go Back</button>
    <button class="btn" id="btn-home">🏠 Go to Google</button>
  </div>
  <div class="footer">Protected by KidGuard v3.1</div>
</div>
<script src="blocked.js"></script>
</body>
</html>
